services:
  - type: web
    name: hgdss-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///./hgdss.db
      - key: APP_NAME
        value: Heisenberg Group Digital Signature System
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60
      - key: PYTHON_VERSION
        value: 3.11.0
